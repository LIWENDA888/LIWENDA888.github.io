    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { 
                sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'sans-serif'],
                mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace']
            },
            animation: { 
                'fade-up': 'fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
                fadeUp: { '0%': { opacity: 0, transform: 'translateY(40px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } }
            }
          },
        },
      }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media (min-width: 1024px) {
            .accordion-item {
                flex: 1;
                transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
                will-change: flex, transform;
            }
            .accordion-container:hover .accordion-item:hover { flex: 2.8; }
        }

        /* --- 轮播图顶级性能动效系统 (增强纯平面推拉视差) --- */
        :root {
            --slide-easing: cubic-bezier(0.65, 0, 0.15, 1);
            --slide-duration: 1.1s; 
        }

        .slide {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
            visibility: hidden; 
        }
        .slide.active { 
            z-index: 2; 
            pointer-events: auto; 
            visibility: visible; 
        }

        /* 图片基础设置：尺寸绝对锁死 100% */
        .slide img {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: translateX(0); /* 确保起始状态是 0，防止闪跳 */
            will-change: transform;
            -webkit-user-drag: none; user-select: none;
        }

        /* 纯黑遮罩：用来模拟旧图被覆盖时的阴影景深感 */
        .slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: none;
            will-change: opacity;
        }

        /* -------------------------------------
           方向：向左滑动 (点击下一张)
        ------------------------------------- */
        .slide.entering-next {
            visibility: visible; z-index: 3;
            animation: clipInNext var(--slide-duration) var(--slide-easing) forwards;
        }
        @keyframes clipInNext {
            0% { clip-path: inset(0 0 0 100%); }
            100% { clip-path: inset(0 0 0 0); }
        }
        
        /* 增强纯平移视差：新图从右侧更远的位置推入 */
        .slide.entering-next img {
            animation: slideImgNext var(--slide-duration) var(--slide-easing) forwards;
        }
        @keyframes slideImgNext {
            0% { transform: translateX(12%); } 
            100% { transform: translateX(0); }
        }

        /* 增强纯平移视差：旧图被推到更远的左侧 */
        .slide.leaving-next {
            visibility: visible; z-index: 1;
            animation: slideOutNext var(--slide-duration) var(--slide-easing) forwards;
        }
        @keyframes slideOutNext {
            0% { transform: translateX(0); }
            100% { transform: translateX(-12%); } 
        }
        .slide.leaving-next::after {
            animation: fadeDark var(--slide-duration) var(--slide-easing) forwards;
        }

        /* -------------------------------------
           方向：向右滑动 (点击上一张)
        ------------------------------------- */
        .slide.entering-prev {
            visibility: visible; z-index: 3;
            animation: clipInPrev var(--slide-duration) var(--slide-easing) forwards;
        }
        @keyframes clipInPrev {
            0% { clip-path: inset(0 100% 0 0); }
            100% { clip-path: inset(0 0 0 0); }
        }
        
        /* 增强纯平移视差：新图从左侧更远的位置推入 */
        .slide.entering-prev img {
            animation: slideImgPrev var(--slide-duration) var(--slide-easing) forwards;
        }
        @keyframes slideImgPrev {
            0% { transform: translateX(-12%); } 
            100% { transform: translateX(0); }
        }

        /* 增强纯平移视差：旧图被推到更远的右侧 */
        .slide.leaving-prev {
            visibility: visible; z-index: 1;
            animation: slideOutPrev var(--slide-duration) var(--slide-easing) forwards;
        }
        @keyframes slideOutPrev {
            0% { transform: translateX(0); }
            100% { transform: translateX(12%); } 
        }
        .slide.leaving-prev::after {
            animation: fadeDark var(--slide-duration) var(--slide-easing) forwards;
        }

        /* 旧图变暗动画 */
        @keyframes fadeDark {
            0% { opacity: 0; }
            100% { opacity: 0.6; } 
        }
    </style>
</head>

    <script>
        // --- 核心轮播顶级调度逻辑 ---
        const slides = document.querySelectorAll('.slide');
        let currentIdx = 0;
        let slideTimer;
        let isAnimating = false;
        
        function goToSlide(index, direction = 'next') {
            if (isAnimating) return;
            isAnimating = true;

            const prevIdx = currentIdx;
            currentIdx = (index + slides.length) % slides.length; 

            const prevSlide = slides[prevIdx];
            const nextSlide = slides[currentIdx];

            // 1. 卸载旧图：赋予离开动画
            prevSlide.classList.remove('active');
            prevSlide.classList.add(direction === 'next' ? 'leaving-next' : 'leaving-prev');

            // 2. 挂载新图：赋予进入动画与激活状态
            nextSlide.classList.add('active');
            nextSlide.classList.add(direction === 'next' ? 'entering-next' : 'entering-prev');

            // 3. 动画结束后的绝对清理
            setTimeout(() => {
                prevSlide.classList.remove('leaving-next', 'leaving-prev');
                nextSlide.classList.remove('entering-next', 'entering-prev');
                isAnimating = false;
            }, 1100);

            resetTimer();
        }

        window.nextSlide = function(e) { 
            if(e) { e.preventDefault(); e.stopPropagation(); }
            goToSlide(currentIdx + 1, 'next'); 
        }
        window.prevSlide = function(e) { 
            if(e) { e.preventDefault(); e.stopPropagation(); }
            goToSlide(currentIdx - 1, 'prev'); 
        }

        function resetTimer() {
            clearInterval(slideTimer);
            slideTimer = setInterval(() => goToSlide(currentIdx + 1, 'next'), 5500); 
        }

        document.addEventListener('DOMContentLoaded', resetTimer);
    </script>
