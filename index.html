<!DOCTYPE html>
<html lang="zh-CN" class="transition-colors duration-300">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FontManager - 字体数据管家</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/pinyin-pro"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class', // 开启深色模式支持
      theme: {
        extend: {
          fontFamily: { brand: ['Outfit', 'sans-serif'] },
          animation: { 'fade-in': 'fadeIn 0.15s ease-out' }
        }
      }
    }
  </script>

  <style>
    /* 沉浸式输入框 (包含深色模式适配) */
    .stealth-input {
      width: 100%;
      background: transparent;
      outline: none;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .stealth-input:hover { border-color: #e4e4e7; background: #f4f4f5; }
    .stealth-input:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    
    .dark .stealth-input:hover { border-color: #3f3f46; background: #27272a; }
    .dark .stealth-input:focus { border-color: #3b82f6; background: #18181b; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3); color: #f4f4f5; }

    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
    .dark ::-webkit-scrollbar-thumb { background: #52525b; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #71717a; }

    [v-cloak] { display: none; }
    
    .dragging { opacity: 0.5; background-color: #eff6ff; }
    .dark .dragging { background-color: #1e3a8a; }
  </style>
</head>

<body class="bg-white dark:bg-[#09090b] text-gray-800 dark:text-gray-200 antialiased font-sans h-screen overflow-hidden transition-colors duration-300">
  
  <div id="app" v-cloak class="w-full h-full flex flex-col">
    
    <!-- 顶部固定栏 -->
    <header class="flex-shrink-0 h-16 bg-white dark:bg-[#18181b] border-b border-gray-200 dark:border-gray-800 flex items-center px-4 md:px-6 gap-4 md:gap-6 z-[60] transition-colors">
      
      <!-- 左侧区域：Logo + 图标按钮 -->
      <div class="flex items-center gap-1.5 whitespace-nowrap">
        <h1 class="font-brand font-bold text-xl tracking-tight text-gray-800 dark:text-gray-100 mr-2">FontManager</h1>
        
        <!-- 置入本地 JS 图标按钮 -->
        <button @click.stop="openFile" title="置入本地 JS 进行静默覆盖" class="flex items-center justify-center w-9 h-9 text-gray-500 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-500/20 dark:hover:text-blue-400 rounded-md transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
        </button>

        <!-- 清除本地缓存垃圾桶图标按钮 -->
        <button @click.stop="clearCache" title="清除本地缓存并重新拉取线上数据" class="flex items-center justify-center w-9 h-9 text-gray-500 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-500/20 dark:hover:text-red-400 rounded-md transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        </button>
      </div>
      
      <!-- 中间区域：铺满搜索框 -->
      <div class="flex-1 w-full">
        <div class="relative group w-full">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400 dark:text-gray-500 group-focus-within:text-blue-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          </div>
          <input type="text" v-model="searchQuery" 
                 :placeholder="dataSourceInfo ? `数据状态：${dataSourceInfo}   /   搜索字体名称...` : '搜索字体名称...'"
                 class="block w-full pl-9 pr-4 py-2 border border-gray-200 dark:border-gray-700 rounded-lg leading-5 bg-gray-50 dark:bg-[#27272a] placeholder-gray-400 dark:placeholder-gray-500 dark:text-gray-200 focus:outline-none focus:bg-white dark:focus:bg-[#18181b] focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-500/30 focus:border-blue-400 sm:text-sm transition-all shadow-sm" />
        </div>
      </div>

      <!-- 右侧区域：深色模式 + 保存按钮 -->
      <div class="flex items-center justify-end gap-2 whitespace-nowrap">
        
        <!-- 深色模式切换按钮 -->
        <button @click.stop="toggleDarkMode" title="切换深色/浅色模式" class="flex items-center justify-center w-10 h-10 text-gray-500 hover:text-gray-800 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-gray-200 dark:hover:bg-gray-800 rounded-lg transition">
          <svg v-if="!isDarkMode" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
          <svg v-else xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        </button>

        <!-- 保存按钮 -->
        <button id="saveBtn" @click.stop="saveFile" :disabled="fontDatabase.length === 0" :title="fileHandle ? '保存并直接覆盖本地文件' : '生成并下载 JS 文件'" 
                class="flex items-center justify-center w-10 h-10 text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:hover:bg-blue-600 rounded-lg transition-all shadow-sm">
          <svg v-if="fileHandle" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
          <svg v-else xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-auto w-full relative pb-40">
      <table class="w-full text-sm text-left min-w-[1200px] border-separate border-spacing-0">
        
        <thead class="text-xs text-gray-500 dark:text-gray-400">
          <tr>
            <th class="sticky top-0 z-40 bg-gray-50 dark:bg-[#18181b] px-2 py-3 w-14 text-center border-b border-r border-gray-200 dark:border-gray-800 shadow-[0_1px_0_#e5e7eb] dark:shadow-[0_1px_0_#27272a]">
              <span v-if="searchQuery" class="text-gray-300 dark:text-gray-600">禁用</span>
              <span v-else>#</span>
            </th>
            <th class="sticky top-0 z-40 bg-gray-50 dark:bg-[#18181b] px-3 py-3 w-64 border-b border-gray-200 dark:border-gray-800 shadow-[0_1px_0_#e5e7eb] dark:shadow-[0_1px_0_#27272a]">字体名称</th>
            <th class="sticky top-0 z-40 bg-gray-50 dark:bg-[#18181b] px-3 py-3 w-32 font-brand border-b border-gray-200 dark:border-gray-800 shadow-[0_1px_0_#e5e7eb] dark:shadow-[0_1px_0_#27272a]">ID</th>
            <th class="sticky top-0 z-40 bg-gray-50 dark:bg-[#18181b] px-3 py-3 w-40 border-b border-gray-200 dark:border-gray-800 shadow-[0_1px_0_#e5e7eb] dark:shadow-[0_1px_0_#27272a]">标签</th>
            <th class="sticky top-0 z-40 bg-gray-50 dark:bg-[#18181b] px-3 py-3 min-w-[150px] border-b border-gray-200 dark:border-gray-800 shadow-[0_1px_0_#e5e7eb] dark:shadow-[0_1px_0_#27272a]">多选分类</th>
            <th class="sticky top-0 z-40 bg-gray-50 dark:bg-[#18181b] px-3 py-3 w-[260px] border-b border-gray-200 dark:border-gray-800 shadow-[0_1px_0_#e5e7eb] dark:shadow-[0_1px_0_#27272a]">图片路径</th>
            <th class="sticky top-0 z-40 bg-gray-50 dark:bg-[#18181b] px-3 py-3 min-w-[260px] border-b border-gray-200 dark:border-gray-800 shadow-[0_1px_0_#e5e7eb] dark:shadow-[0_1px_0_#27272a]">下载地址</th>
            <th class="sticky top-0 z-40 bg-gray-50 dark:bg-[#18181b] px-3 py-3 w-12 text-center border-b border-gray-200 dark:border-gray-800 shadow-[0_1px_0_#e5e7eb] dark:shadow-[0_1px_0_#27272a]">删除</th>
          </tr>
        </thead>

        <tbody class="bg-white dark:bg-[#09090b]">
          
          <tr v-if="fontDatabase.length === 0">
            <td colspan="8" class="text-center py-24 text-gray-400 dark:text-gray-500 border-b border-gray-100 dark:border-gray-800/50">
              <div class="flex flex-col items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-3 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z" /></svg>
                <p>正在读取数据中，若长久未显示请检查文件路径...</p>
              </div>
            </td>
          </tr>

          <tr v-if="searchQuery && filteredFontDatabase.length === 0" class="bg-gray-50/50 dark:bg-gray-900/50">
            <td colspan="8" class="text-center py-12 text-gray-400 dark:text-gray-500 border-b border-gray-100 dark:border-gray-800/50">没有找到符合搜索条件的字体</td>
          </tr>

          <!-- ============================ -->
          <!-- 行状态优化：悬浮加深与持续高亮 -->
          <!-- ============================ -->
          <tr v-for="(font, index) in filteredFontDatabase" :key="font.__uid" 
              class="group transition-all duration-200 hover:bg-gray-100 dark:hover:bg-[#27272a]"
              :class="{
                'bg-gray-100 dark:bg-[#27272a] shadow-sm relative z-10': activePopoverId === font.__uid,
                'dragging': dragItem === font
              }"
              :draggable="isRowDraggable && !searchQuery"
              @dragstart="!searchQuery && dragStart(font, $event)"
              @dragenter.prevent
              @dragover.prevent
              @drop="!searchQuery && drop(font)">
            
            <td class="px-2 py-1.5 border-b border-r border-gray-100 dark:border-gray-800/50"
                @mouseenter="!searchQuery && (isRowDraggable = true)" 
                @mouseleave="isRowDraggable = false">
              <div class="flex items-center justify-center gap-1 transition-colors p-1.5 rounded"
                   :class="searchQuery ? 'text-gray-200 dark:text-gray-700 cursor-not-allowed' : 'cursor-grab active:cursor-grabbing text-gray-400 dark:text-gray-600 hover:text-blue-500 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-500/10'">
                <span class="text-xs font-mono w-4 text-right select-none">{{ fontDatabase.indexOf(font) + 1 }}</span>
                <svg v-if="!searchQuery" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" /></svg>
              </div>
            </td>
            
            <td class="px-2 py-1.5 border-b border-gray-100 dark:border-gray-800/50">
              <input type="text" v-model="font.name" @input="handleNameInput(font)" class="stealth-input font-bold dark:text-gray-200" placeholder="输入名称">
            </td>
            <td class="px-2 py-1.5 border-b border-gray-100 dark:border-gray-800/50">
              <input type="text" v-model="font.id" class="stealth-input text-gray-500 dark:text-gray-400 font-brand text-sm" placeholder="自动生成">
            </td>
            <td class="px-2 py-1.5 border-b border-gray-100 dark:border-gray-800/50">
              <input type="text" v-model="font.badge" class="stealth-input text-xs dark:text-gray-400" placeholder="选填...">
            </td>
            
            <td class="px-3 py-1.5 border-b border-gray-100 dark:border-gray-800/50 whitespace-normal">
              <div class="flex flex-wrap gap-1.5">
                <label v-for="(cat, cIndex) in categories" :key="cat.id" class="cursor-pointer">
                  <input type="checkbox" :value="cat.id" v-model="font.categoryIds" class="hidden peer">
                  <span class="inline-block px-2 py-1 text-xs rounded border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 transition-all select-none hover:bg-gray-100 dark:hover:bg-gray-800 hover:border-gray-300 dark:hover:border-gray-600 peer-checked:bg-blue-500 peer-checked:text-white peer-checked:border-blue-500 peer-checked:shadow-sm dark:peer-checked:bg-blue-600 dark:peer-checked:border-blue-600">
                    {{ cat.name }}
                  </span>
                </label>
              </div>
            </td>
            
            <td class="px-2 py-1.5 border-b border-gray-100 dark:border-gray-800/50">
              <div class="flex items-center bg-gray-50 dark:bg-[#18181b] border border-gray-200 dark:border-gray-700 rounded-md overflow-hidden focus-within:border-blue-400 focus-within:ring-1 focus-within:ring-blue-100 dark:focus-within:ring-blue-900/50 transition-all">
                <div class="pl-2 pr-1 py-1 flex items-center justify-center pointer-events-none border-r border-gray-100 dark:border-gray-800 bg-gray-100/50 dark:bg-gray-800/50">
                  <span class="text-[10px] text-gray-400 dark:text-gray-500 font-mono tracking-tighter select-none">/data/img-index/</span>
                </div>
                <input type="text" v-model="font.imageName" class="w-8 min-w-[30px] flex-1 bg-transparent text-xs font-bold text-gray-700 dark:text-gray-300 outline-none px-2 py-1" placeholder="名称">
                <div class="pr-1 bg-transparent flex items-center border-l border-gray-100 dark:border-gray-800">
                  <select v-model="font.imageExt" class="bg-transparent dark:bg-[#18181b] text-xs font-mono text-blue-500 dark:text-blue-400 outline-none cursor-pointer py-1 hover:text-blue-700 dark:hover:text-blue-300 font-bold transition-colors">
                    <option value=".png">.png</option>
                    <option value=".jpg">.jpg</option>
                    <option value=".svg">.svg</option>
                    <option value=".gif">.gif</option>
                    <option value=".webp">.webp</option>
                  </select>
                </div>
              </div>
            </td>
            
            <td class="px-3 py-1.5 border-b border-gray-100 dark:border-gray-800/50 relative">
              
              <!-- ============================ -->
              <!-- 按钮点击激活状态优化 -->
              <!-- ============================ -->
              <div @click.stop="toggleDownloadsPopover(font)" 
                   class="flex flex-wrap gap-1.5 cursor-pointer p-1 rounded transition-all border min-h-[32px] items-center"
                   :class="activePopoverId === font.__uid 
                     ? 'bg-white dark:bg-[#18181b] border-blue-300/60 dark:border-blue-500/30 ring-1 ring-blue-500/20 shadow-sm' 
                     : 'border-transparent hover:bg-white dark:hover:bg-[#18181b] hover:border-gray-200 dark:hover:border-gray-700 hover:shadow-sm'">
                <template v-if="font.downloads && font.downloads.length > 0">
                  <span v-for="(dl, i) in font.downloads" :key="i" class="px-2 py-0.5 bg-white dark:bg-[#27272a] border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 rounded text-xs shadow-sm">
                    {{ dl.name || '未命名' }}
                  </span>
                </template>
                <span v-else class="text-xs text-gray-400 dark:text-gray-600 flex items-center gap-1 px-1 py-0.5">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                  添加下载地址
                </span>
              </div>

              <!-- 气泡面板 -->
              <div v-if="activePopoverId === font.__uid" @click.stop 
                   class="absolute top-full left-0 mt-2 w-[460px] bg-white dark:bg-[#18181b] rounded-xl p-4 shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] dark:shadow-black/50 z-[100] border border-gray-100 dark:border-gray-800 animate-fade-in before:content-[''] before:absolute before:-top-2 before:left-6 before:border-8 before:border-transparent before:border-b-gray-100 dark:before:border-b-gray-800 after:content-[''] after:absolute after:-top-[7px] after:left-[25px] after:border-[7px] after:border-transparent after:border-b-white dark:after:border-b-[#18181b]">
                
                <div class="text-xs font-bold text-gray-500 dark:text-gray-400 mb-3 border-b border-gray-100 dark:border-gray-800 pb-2.5 flex justify-between items-center">
                  <span>配置下载地址</span>
                  <button @click.stop="activePopoverId = null" class="text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 p-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded transition-colors" title="关闭弹窗">✕</button>
                </div>
                
                <div class="space-y-2 max-h-[320px] overflow-y-auto pr-1">
                  <div v-for="(dl, i) in font.downloads" :key="i" class="flex gap-1.5 items-center bg-gray-50 dark:bg-[#27272a] p-1.5 rounded-lg border border-gray-200 dark:border-gray-700 group focus-within:border-blue-400 focus-within:ring-1 focus-within:ring-blue-100 dark:focus-within:ring-blue-900/30 transition-all shadow-sm">
                    <input type="text" v-model="dl.name" placeholder="名称" class="w-20 text-xs px-2 py-1.5 bg-transparent outline-none border-r border-gray-200 dark:border-gray-600 font-medium text-gray-800 dark:text-gray-200">
                    <input type="text" v-model="dl.url" placeholder="URL 链接地址" class="flex-1 text-xs px-2 py-1.5 bg-transparent outline-none border-r border-gray-200 dark:border-gray-600 text-blue-600 dark:text-blue-400 font-brand placeholder-gray-400 dark:placeholder-gray-500">
                    <input type="text" v-model="dl.pwd" placeholder="选填" class="w-16 text-xs px-2 py-1.5 bg-transparent outline-none text-center placeholder-gray-400 dark:placeholder-gray-500 dark:text-gray-200">
                    <button @click="removeDownload(font, i)" class="text-gray-400 dark:text-gray-500 hover:text-red-500 dark:hover:text-red-400 px-1.5 transition-colors" title="删除此条配置">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                  </div>
                  <div v-if="!font.downloads || font.downloads.length === 0" class="text-center py-8 text-gray-400 dark:text-gray-600 text-xs bg-gray-50 dark:bg-gray-800/50 rounded-lg border border-dashed border-gray-200 dark:border-gray-700">
                    当前暂无配置，请点击下方添加
                  </div>
                </div>

                <button @click="addDownload(font)" class="mt-3 w-full py-2 bg-blue-50 dark:bg-blue-500/10 hover:bg-blue-100 dark:hover:bg-blue-500/20 text-blue-600 dark:text-blue-400 rounded-lg text-xs font-bold transition flex justify-center items-center gap-1">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                  新增下载方式
                </button>
              </div>
            </td>

            <td class="px-3 py-1.5 border-b border-gray-100 dark:border-gray-800/50 text-center">
              <button @click.stop="deleteFont(font)" class="p-1.5 text-gray-400 dark:text-gray-500 hover:text-red-600 dark:hover:text-red-400 rounded hover:bg-red-50 dark:hover:bg-red-500/10 opacity-0 group-hover:opacity-100 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              </button>
            </td>
          </tr>
          
          <tr v-if="!searchQuery && fontDatabase.length > 0">
            <td colspan="8" class="p-3 border-b border-gray-100 dark:border-gray-800/50">
              <button @click.stop="addFont" class="w-full py-2 text-sm text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-blue-50 dark:hover:bg-blue-500/10 rounded-lg transition-colors flex items-center justify-center gap-1.5 font-medium border border-dashed border-transparent hover:border-blue-200 dark:hover:border-blue-800">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                在底部新增字体
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </main>

  </div>

  <script>
    const { createApp, ref, computed, nextTick, onMounted, onUnmounted, watch } = Vue;
    const { pinyin } = pinyinPro;

    createApp({
      setup() {
        const fileHandle = ref(null);
        const dataSourceInfo = ref('');
        const categories = ref([]);
        const fontDatabase = ref([]);
        
        const searchQuery = ref('');
        const activePopoverId = ref(null);
        
        const isRowDraggable = ref(false);
        const dragItem = ref(null);

        // 深色模式状态管理
        const isDarkMode = ref(localStorage.getItem('darkMode') === 'true');
        const toggleDarkMode = () => {
          isDarkMode.value = !isDarkMode.value;
          localStorage.setItem('darkMode', isDarkMode.value);
          if (isDarkMode.value) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        };

        const defaultPath = './data-index.js';
        const CACHE_KEY = 'fontManagerCache';

        // 自动读取与缓存逻辑
        const initData = async () => {
          // 1. 优先尝试读取本地浏览器的修改缓存
          const cached = localStorage.getItem(CACHE_KEY);
          if (cached) {
            try {
              const parsed = JSON.parse(cached);
              if (parsed.categories && parsed.fontDatabase) {
                categories.value = parsed.categories;
                fontDatabase.value = parsed.fontDatabase.map(font => initFont(font));
                dataSourceInfo.value = '浏览器临时缓存（存在未保存修改）';
                return;
              }
            } catch (e) {
              console.warn("缓存解析失败，尝试拉取线上数据...");
            }
          }
          
          // 2. 如果没有缓存，则读取线上的 ./data-index.js
          try {
            const response = await fetch(defaultPath + '?t=' + new Date().getTime());
            if (!response.ok) throw new Error(`找不到文件`);
            const content = await response.text();
            const parseScript = `${content}\nreturn { categories, fontDatabase };`;
            const parsedData = new Function(parseScript)();
            categories.value = parsedData.categories || [];
            fontDatabase.value = (parsedData.fontDatabase || []).map(font => initFont(font));
            dataSourceInfo.value = defaultPath;
          } catch (error) {
            dataSourceInfo.value = '读取失败';
            console.error(error);
          }
        };

        const closePopoverListener = () => {
          activePopoverId.value = null;
        };

        onMounted(() => {
          document.addEventListener('click', closePopoverListener);
          if (isDarkMode.value) document.documentElement.classList.add('dark');
          initData();
        });

        onUnmounted(() => {
          document.removeEventListener('click', closePopoverListener);
        });

        // 监听数据变化，自动保存到 localStorage
        watch([categories, fontDatabase], () => {
          if (fontDatabase.value.length > 0) {
            const dataToCache = {
              categories: categories.value,
              fontDatabase: fontDatabase.value
            };
            localStorage.setItem(CACHE_KEY, JSON.stringify(dataToCache));
            if (!fileHandle.value && dataSourceInfo.value !== '浏览器临时缓存（存在未保存修改）') {
              dataSourceInfo.value = '浏览器临时缓存（存在未保存修改）';
            }
          }
        }, { deep: true });

        // 清除本地缓存按钮
        const clearCache = () => {
          if (confirm('警告：此操作将清空你当前在浏览器里做的所有未保存修改，并重新拉取线上最新数据。确定要清空吗？')) {
            localStorage.removeItem(CACHE_KEY);
            location.reload();
          }
        };

        const parseImage = (url) => {
          const prefix = '/data/img-index/';
          if (!url) return { name: '', ext: '.png' };
          if (url.startsWith(prefix)) {
            const rest = url.substring(prefix.length);
            const lastDot = rest.lastIndexOf('.');
            if (lastDot > -1) {
              return { name: rest.substring(0, lastDot), ext: rest.substring(lastDot) };
            }
            return { name: rest, ext: '.png' };
          }
          return { name: url, ext: '' }; 
        };

        const initFont = (font = {}) => {
          const parsedImg = parseImage(font.imageUrl);
          return {
            __uid: font.__uid || Math.random().toString(36).substring(2),
            id: '', name: '', badge: '', categoryIds: [], downloads: [],
            imageName: parsedImg.name,
            imageExt: parsedImg.ext,
            ...font
          };
        };

        const filteredFontDatabase = computed(() => {
          if (!searchQuery.value) return fontDatabase.value;
          const q = searchQuery.value.toLowerCase();
          return fontDatabase.value.filter(font => 
            (font.name && font.name.toLowerCase().includes(q)) || 
            (font.id && font.id.toLowerCase().includes(q))
          );
        });

        const dragStart = (font, event) => {
          if(searchQuery.value) return; 
          dragItem.value = font;
          event.dataTransfer.effectAllowed = 'move';
        };
        
        const drop = (font) => {
          if(searchQuery.value) return;
          if (dragItem.value && dragItem.value !== font) {
            const from = fontDatabase.value.indexOf(dragItem.value);
            const to = fontDatabase.value.indexOf(font);
            if(from > -1 && to > -1) {
              const item = fontDatabase.value.splice(from, 1)[0];
              fontDatabase.value.splice(to, 0, item);
            }
          }
          dragItem.value = null;
          isRowDraggable.value = false;
        };

        const toggleDownloadsPopover = (font) => {
          activePopoverId.value = activePopoverId.value === font.__uid ? null : font.__uid;
        };

        const openFile = async () => {
          try {
            const [handle] = await window.showOpenFilePicker({
              types: [{ description: 'JS Files', accept: { 'text/javascript': ['.js'] } }],
            });
            fileHandle.value = handle;
            dataSourceInfo.value = `本地文件: ${handle.name}`;
            const file = await handle.getFile();
            const content = await file.text();

            const parseScript = `${content}\nreturn { categories, fontDatabase };`;
            const parsedData = new Function(parseScript)();
            
            categories.value = parsedData.categories || [];
            fontDatabase.value = (parsedData.fontDatabase || []).map(font => initFont(font));
            
            searchQuery.value = ''; 
          } catch (error) {
            if(error.name !== 'AbortError') alert("读取失败，请检查文件格式。");
          }
        };

        const showSuccessAnimation = () => {
          const btn = document.getElementById('saveBtn');
          const originalIcon = btn.innerHTML;
          btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>`;
          btn.classList.add('bg-emerald-500', 'hover:bg-emerald-600');
          btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
          setTimeout(() => {
            btn.innerHTML = originalIcon;
            btn.classList.remove('bg-emerald-500', 'hover:bg-emerald-600');
            btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
          }, 1500);
        };

        const saveFile = async () => {
          if (fontDatabase.value.length === 0) return;
          try {
            let catStr = '[\n';
            categories.value.forEach((cat, index) => {
              catStr += `  { "id": ${JSON.stringify(cat.id)}, "name": ${JSON.stringify(cat.name)} }`;
              if (index < categories.value.length - 1) catStr += ',';
              catStr += '\n';
            });
            catStr += ']';

            let fontStr = '[\n';
            fontDatabase.value.forEach((font, index) => {
              const parts = [];
              parts.push(`"id": ${JSON.stringify(font.id || "")}`);
              parts.push(`"name": ${JSON.stringify(font.name || "")}`);
              if (font.badge) parts.push(`"badge": ${JSON.stringify(font.badge)}`);
              parts.push(`"categoryIds": ${JSON.stringify(font.categoryIds || [])}`);
              
              const imgName = font.imageName || "";
              const imgExt = font.imageExt || ".png";
              const fullImgUrl = imgName ? `/data/img-index/${imgName}${imgExt}` : "";
              parts.push(`"imageUrl": ${JSON.stringify(fullImgUrl)}`);
              
              const cleanDownloads = (font.downloads || []).map(dl => {
                const cleanDl = { ...dl };
                if (!cleanDl.pwd) delete cleanDl.pwd;
                return cleanDl;
              });
              parts.push(`"downloads": ${JSON.stringify(cleanDownloads)}`);

              let objStr = '{ ' + parts.join(', ') + ' }';
              fontStr += '  ' + objStr;
              if (index < fontDatabase.value.length - 1) fontStr += ',';
              fontStr += '\n';
            });
            fontStr += ']';

            const newContent = `const categories = ${catStr};\n\nconst fontDatabase = ${fontStr};\n`;

            if (fileHandle.value) {
              const writable = await fileHandle.value.createWritable();
              await writable.write(newContent);
              await writable.close();
              showSuccessAnimation();
              dataSourceInfo.value = `已保存至本地: ${fileHandle.value.name}`;
            } else {
              const blob = new Blob([newContent], { type: 'text/javascript' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = 'data-index.js';
              a.click();
              URL.revokeObjectURL(url);
              showSuccessAnimation();
            }
          } catch (error) {
            alert("保存失败！请确保赋予了写入权限。");
          }
        };

        const handleNameInput = (font) => {
          if (!font.name) { font.id = ''; return; }
          font.id = pinyin(font.name, { toneType: 'none', type: 'array' }).join('').replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        };

        const addFont = () => {
          fontDatabase.value.push(initFont({ 
            imageName: '', 
            imageExt: '.png',
            downloads: [
              { name: '百度网盘', url: '', pwd: '推荐' },
              { name: '夸克网盘', url: '', pwd: '' },
              { name: 'Lanzou', url: '', pwd: '' }
            ]
          }));
          nextTick(() => {
            const mainContainer = document.querySelector('main');
            if(mainContainer) mainContainer.scrollTo({ top: mainContainer.scrollHeight, behavior: 'smooth' });
          });
        };

        const deleteFont = (font) => {
          if(confirm(`确定删除该行数据？`)) {
            const idx = fontDatabase.value.indexOf(font);
            if(idx > -1) fontDatabase.value.splice(idx, 1);
          }
        };

        const addDownload = (font) => {
          if (!font.downloads) font.downloads = [];
          font.downloads.push({ name: '', url: '', pwd: '' });
          nextTick(() => {
            const container = document.querySelector('.overflow-y-auto');
            if(container) container.scrollTop = container.scrollHeight;
          });
        };
        const removeDownload = (font, index) => { font.downloads.splice(index, 1); };

        return {
          fileHandle, dataSourceInfo, categories, fontDatabase, searchQuery, filteredFontDatabase, 
          activePopoverId, isRowDraggable, dragItem, dragStart, drop, 
          isDarkMode, toggleDarkMode, clearCache,
          toggleDownloadsPopover, openFile, saveFile, 
          handleNameInput, addFont, deleteFont, addDownload, removeDownload
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
