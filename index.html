    <script>
        // 轮播逻辑与手势控制
        let currentIdx = 0;
        let slideTimer;
        let startX = 0;
        let isDragging = false;
        
        const container = document.getElementById('carousel-container');
        const slides = document.querySelectorAll('.slide');
        const activePill = document.getElementById('active-pill');
        const stepWidth = 48; 

        function goToSlide(index) {
            slides[currentIdx].classList.remove('active');
            currentIdx = (index + slides.length) % slides.length; 
            slides[currentIdx].classList.add('active');
            activePill.style.transform = `translateX(${currentIdx * stepWidth}px)`;
            resetTimer();
        }

        function nextSlide() { goToSlide(currentIdx + 1); }
        function prevSlide() { goToSlide(currentIdx - 1); }

        function resetTimer() {
            clearInterval(slideTimer);
            slideTimer = setInterval(nextSlide, 5000); 
        }

        // 手势与拖拽逻辑
        const handleStart = (e) => {
            isDragging = true;
            startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            container.classList.replace('carousel-grab', 'carousel-grabbing');
        };

        const handleEnd = (e) => {
            if (!isDragging) return;
            const endX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
            const deltaX = startX - endX;

            if (Math.abs(deltaX) > 50) {
                if (deltaX > 0) nextSlide();
                else prevSlide();
            }
            isDragging = false;
            container.classList.replace('carousel-grabbing', 'carousel-grab');
        };

        container.addEventListener('touchstart', handleStart, { passive: true });
        container.addEventListener('touchend', handleEnd, { passive: true });
        container.addEventListener('mousedown', handleStart);
        window.addEventListener('mouseup', handleEnd);

        document.addEventListener('DOMContentLoaded', resetTimer);
    </script>
</body>
